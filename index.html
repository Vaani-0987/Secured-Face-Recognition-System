<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE-EYE</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>

        :root {
            --primary: #00f2ff;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            padding: 20px;
        }

        .video-container {
            position: relative;
            background: #000;
            border: 2px solid #334155; 
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        video { width: 100%;
            height: auto;
            display: block;
        }

        canvas {
            position: absolute;
            top: 0; 
            left: 0;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 3s linear infinite;
            z-index: 10;
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .panel {
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 25px;
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            backdrop-filter: blur(10px); 
            height: 600px; 
        }

        h1 {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 1.5rem; 
            color: var(--primary);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            font-size: 0.85rem;
            min-height: 20px; 
        }

        input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #475569;
            padding: 10px; 
            border-radius: 6px; 
            color: white; 
            outline: none; 
        }

        button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-reg {
            background: var(--primary);
            color: #000;
        }
        .btn-reg:hover { background: #5df9ff; }
        .btn-reset {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            font-size: 0.7rem;
            margin-top: auto;
        }

        .logs {
            font-family: 'Courier New', monospace;font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px; flex-grow: 1;
            overflow-y: auto;
            border-radius: 6px;
            color: #94a3b8;
            border: 1px solid #1e293b; }
        .user-item {
            display: flex;
            justify-content: space-between;
            padding: 6px;
            border-bottom: 1px solid #1e293b;
            font-size: 0.8rem;
        }

        .grant { color: var(--success); }
        .deny { color: var(--danger); }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="video-container" id="video-wrapper">
            <div class="scanner-line"></div>
            <video id="video" width="640" height="480" autoplay muted></video>
        </div>
        <div class="panel">
            <h1>Secure Access</h1>
            <div class="status-box" id="status">INITIALIZING...</div>
            <div id="registration-zone" style="display:flex; flex-direction:column; gap:8px;">
                <input type="text" id="userName" placeholder="Enter Full Name">
                <button class="btn-reg" onclick="registerFace()">Enroll Personnel</button>
            </div>
            <div id="user-management">
                <p style="font-size: 0.7rem; color: var(--primary); margin: 5px 0;">AUTHORIZED DATABASE</p>
                <div id="user-list" style="max-height: 100px; overflow-y:auto;"></div>
            </div>
            <p style="font-size: 0.7rem; color: var(--primary); margin: 5px 0;">SYSTEM AUDIT LOG</p>
            <div class="logs" id="logs"></div>
            <button class="btn-reset" onclick="resetDatabase()">Wipe Master Data</button>

        </div>

    </div>
    
</body>
</html>
